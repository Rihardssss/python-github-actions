name: Local Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run:
    runs-on: self-hosted

    steps:
      - name: Sync dev to real local server
        run: cp /Users/rihardsindars/python-github-actions/dir_dev/app.py /Users/rihardsindars/python-github-actions/dir_server/app.py

      - name: Show server file
        run: cat /Users/rihardsindars/python-github-actions/dir_server/app.py

      - name: Run Python and save output
        run: python3 /Users/rihardsindars/python-github-actions/dir_server/app.py | tee /Users/rihardsindars/python-github-actions/dir_server/output.log
