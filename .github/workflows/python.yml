name: Run Python

on:
  push:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Copy to server
        run: cp dir_dev/app.py dir_server/app.py

      - name: Run from server
        run: python dir_server/app.py
