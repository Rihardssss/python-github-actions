name: Run Python locally

on:
  push:
  workflow_dispatch:

jobs:
  run:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create server dir
        run: mkdir -p dir_server

      - name: Copy to server
        run: cp dir_dev/app.py dir_server/app.py

      - name: Run from server
        run: python3 dir_server/app.py
