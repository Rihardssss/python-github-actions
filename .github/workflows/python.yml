name: Local Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create server dir
        run: mkdir -p dir_server

      - name: Sync dev to server
        run: cp dir_dev/app.py dir_server/app.py

      - name: Show server file
        run: cat dir_server/app.py

      - name: Run Python app
        run: python3 dir_server/app.py
